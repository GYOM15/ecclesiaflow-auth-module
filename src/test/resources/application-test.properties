# ============================================================================
# Test Configuration for EcclesiaFlow Auth Module
# ============================================================================

# Database Configuration (H2 for tests)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect


# Members Module Configuration
ecclesiaflow.members.base-url=http://localhost:8080

# Logging
logging.level.com.ecclesiaflow=DEBUG
logging.level.org.springframework.security=DEBUG

# Disable gRPC server in tests (we use InProcessServer instead)
grpc.enabled=false
