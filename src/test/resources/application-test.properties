# ============================================================================
# Test Configuration for EcclesiaFlow Auth Module
# ============================================================================

# Database Configuration (H2 for tests)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ============================================================================
# Keycloak (stubbed for tests)
# ============================================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/ecclesiaflow
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/ecclesiaflow/protocol/openid-connect/certs
keycloak.admin.server-url=http://localhost:8180
keycloak.admin.realm=ecclesiaflow
keycloak.admin.service.client-id=ecclesiaflow-admin-service
keycloak.admin.service.client-secret=test-secret
keycloak.direct-grant.client-id=ecclesiaflow-frontend
keycloak.direct-grant.client-secret=test-frontend-secret

# ============================================================================
# gRPC (disabled — tests use InProcessServer)
# ============================================================================
grpc.enabled=false
grpc.members.host=localhost
grpc.members.port=9091
grpc.client.shutdown-timeout-seconds=5
grpc.server.port=9090
grpc.server.shutdown-timeout-seconds=5

# ============================================================================
# CORS & Token
# ============================================================================
cors.allowed-origins=http://localhost:3000
auth.token.setup.ttl-hours=1

# Logging
logging.level.com.ecclesiaflow=DEBUG
logging.level.org.springframework.security=DEBUG
