# ============================================================================
# DEVELOPMENT PROFILE - Local Development
# ============================================================================
# This profile is for local development with MySQL
# Use .env.dev file to configure environment variables
# ============================================================================

# ============================================================================
# DATABASE - Development (MySQL with Flyway-managed schema)
# ============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# ============================================================================
# MAIL - Development (Local SMTP or Mock)
# ============================================================================
# Option 1: Gmail SMTP for testing (configure in .env.dev)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Option 2: Local SMTP server like MailHog (uncomment to use)
# spring.mail.host=localhost
# spring.mail.port=1025
# spring.mail.properties.mail.smtp.auth=false
# spring.mail.properties.mail.smtp.starttls.enable=false

# ============================================================================
# LOGGING - Development (Verbose logging)
# ============================================================================
logging.level.com.ecclesiaflow.springsecurity=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.root=INFO

# ============================================================================
# ACTUATOR - Development (All endpoints exposed)
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics,env,configprops,beans
management.endpoint.health.show-details=always

# ============================================================================
# SECURITY - Development (Relaxed for testing)
# ============================================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI}
keycloak.account-management.url=${KEYCLOAK_ACCOUNT_URL}