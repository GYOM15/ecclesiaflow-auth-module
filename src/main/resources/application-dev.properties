# ============================================================================
# DEVELOPMENT PROFILE - Local Development
# ============================================================================
# This profile is for local development with MySQL
# Use .env.dev file to configure environment variables
# ============================================================================

# ============================================================================
# LOGGING - Development (Verbose logging)
# ============================================================================
logging.level.com.ecclesiaflow.springsecurity=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.root=INFO

# ============================================================================
# ACTUATOR - Development (All endpoints exposed)
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics,env,configprops,beans
management.endpoint.health.show-details=always