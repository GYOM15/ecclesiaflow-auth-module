openapi: 3.1.1
info:
  title: EcclesiaFlow Auth Module API
  description: |
    Auth Module API for EcclesiaFlow platform.

    **Architecture:**
    - Authentication is handled by Keycloak (OAuth2/OIDC)
    - This module manages user account lifecycle and capabilities
    - Clients authenticate directly with Keycloak

    **Keycloak Endpoints (not part of this API):**
    - Token: `POST /realms/ecclesiaflow/protocol/openid-connect/token`
    - Refresh: `POST /realms/ecclesiaflow/protocol/openid-connect/token` (grant_type=refresh_token)
    - Logout: `POST /realms/ecclesiaflow/protocol/openid-connect/logout`
    - UserInfo: `GET /realms/ecclesiaflow/protocol/openid-connect/userinfo`

    **Global Roles (Keycloak):**
    - SUPER_ADMIN: Platform administrator
    - SUPPORT: Support staff with read access
    - USER: Verified account (NOT church member)

    **Multi-Tenant Authorization:**
    - Church-specific roles managed in Church Module database
    - Capabilities defined as enums, exposed via this API
  version: 1.0.0
  contact:
    name: EcclesiaFlow Team
    email: support@ecclesiaflow.com
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8081
    description: Development server
  - url: https://staging-auth.ecclesiaflow.com
    description: Staging server
  - url: https://auth.ecclesiaflow.com
    description: Production server

security:
  - BearerAuth: []

paths:
  /ecclesiaflow/capabilities:
    get:
      tags:
        - Capabilities
      summary: Get all platform capabilities (aggregated)
      description: |
        Returns all available capabilities from all modules.
        This endpoint aggregates capabilities from Auth, Church, Communication, Events, and Finance modules.

        **Security:** Requires SUPER_ADMIN or SUPPORT role.

        **Resilience:**
        - If a module is unavailable, response includes partial data
        - Check `partial` flag and `sources` array for module status
        - Available modules are always returned even if others fail
      operationId: Capabilities.GetAll
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All capabilities grouped by module (may be partial if some modules unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllCapabilitiesResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /ecclesiaflow/capabilities/auth:
    get:
      tags:
        - Capabilities
      summary: Get Auth module capabilities
      description: |
        Returns capabilities owned by the Auth module.

        **Security:** Requires SUPER_ADMIN or SUPPORT role.
      operationId: Capabilities.GetAuthCapabilities
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Auth module capabilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleCapabilitiesResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /ecclesiaflow/auth/password/setup:
    post:
      tags:
        - Password Management
      summary: Set initial password for new user
      description: |
        Sets the initial password for a new user after email confirmation.
        Creates user in Keycloak and sets the password.

        **Prerequisites:**
        - Setup token is issued only after successful email confirmation in Members Module
        - Members Module calls Auth Module (gRPC) to request token generation
        - Token is sent to user via email with setup link

        **Process:**
        1. Validate setup token from header (purpose="password_setup", TTL=24h)
        2. Extract user info from token (email, memberRecordId)
        3. Create user in Keycloak with password (enabled=true) → generates keycloakUserId
        4. Notify Members Module via gRPC (memberRecordId confirmed, link to keycloakUserId)
        5. Invalidate token (one-time use via jti)
        6. Return success message
        
        **Note:** `memberRecordId` is the Members Module internal ID, distinct from `keycloakUserId` (Keycloak sub claim).

        **Token:** Provided in `X-Setup-Token` header (not body or Authorization)

        **Security:**
        - Token is one-time use (jti stored in DB)
        - Generic error messages prevent enumeration
        - Actual errors logged server-side with masked data
      operationId: Auth.SetInitialPassword
      security: []
      parameters:
        - $ref: '#/components/parameters/SetupTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupPasswordRequest'
      responses:
        '200':
          description: Password set and account activated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordManagementResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/TokenInvalidError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '410':
          $ref: '#/components/responses/TokenExpiredError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token issued by Keycloak.

        **Format:** `Authorization: Bearer <token>`

        **Obtain token from Keycloak:**
        `POST /realms/ecclesiaflow/protocol/openid-connect/token`

        **Token contains:**
        - sub: User ID (string)
        - email: User email
        - roles: Global roles (SUPER_ADMIN, SUPPORT, USER)

  responses:
    BadRequestError:
      description: |
        Validation error:
        - Invalid JSON body
        - Password does not match pattern
        - Required header missing
        - Required field missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

    UnauthorizedError:
      description: |
        Authentication required - Keycloak Bearer token missing, invalid, or expired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

    ForbiddenError:
      description: |
        Access denied - insufficient permissions for this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

    TokenInvalidError:
      description: |
        Token invalid (403):
        - Signature verification failed
        - Wrong token purpose (e.g., reset token used for setup)
        - Token payload mismatch (email/memberRecordId)
        
        **Security:** Generic message prevents enumeration.
        Actual reason logged server-side with masked data.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

    TokenExpiredError:
      description: |
        Token expired or already used (410):
        - Token TTL exceeded (setup=24h, reset=15min)
        - Token jti already consumed (one-time use)
        
        **Note:** Backend may distinguish via error field (TOKEN_EXPIRED vs TOKEN_USED) for client debugging.
        
        **Security:** Generic message prevents enumeration.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

    ConflictError:
      description: |
        Resource conflict (409):
        - Email already registered in Keycloak
        - User disabled or deleted (for reset)
        - Policy conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

    InternalServerError:
      description: |
        Internal server error - please try again later.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  parameters:
    SetupTokenHeader:
      name: X-Setup-Token
      in: header
      required: true
      description: |
        Temporary token for initial password setup (purpose="password_setup", TTL=24h).
        Received via email link after account creation.
        
        Signed one-time token (JWT-like or opaque), validated server-side.
      schema:
        type: string
        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."


  schemas:
    # ==========================================
    # Password Management Schemas
    # ==========================================
    
    SetupPasswordRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          format: password
          description: |
            New password for the account.
            Token is provided in X-Setup-Token header.
            
            **Security rules:**
            - Minimum 8 characters
            - Maximum 128 characters
            - At least 1 lowercase letter
            - At least 1 uppercase letter
            - At least 1 digit
            - At least 1 special character (@$!%*?&)
          example: SecurePassword123!
          minLength: 8
          maxLength: 128
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&])[A-Za-z\\d@$!%*?&]{8,128}$"

    PasswordManagementResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Success or status message
          example: "If an account exists with this email, you will receive a reset link."

    # ==========================================
    # Common Schemas
    # ==========================================

    ApiErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-01-15T22:30:00Z"
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Validation failed"
        path:
          type: string
          example: "/ecclesiaflow/auth/password/setup"
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
          description: Optional validation errors for 400 responses
    ValidationError:
      type: object
      properties:
        message:
          type: string
        path:
          type: string
        code:
          type: string
        type:
          type: string
    # ==========================================
    # Capabilities Schemas
    # ==========================================

    AllCapabilitiesResponse:
      type: object
      required:
        - partial
        - sources
      properties:
        partial:
          type: boolean
          description: True if some modules were unavailable during aggregation
          example: false
        sources:
          type: array
          items:
            $ref: '#/components/schemas/CapabilitySourceStatus'
          description: Status of each module source
        auth:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityDto'
        church:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityDto'
        comm:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityDto'
        events:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityDto'
        finance:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityDto'

    CapabilitySourceStatus:
      type: object
      required:
        - module
        - status
      properties:
        module:
          type: string
          enum: [auth, members, church, comm, events, finance]
          description: Module name
        status:
          type: string
          enum: [available, unavailable, error]
          description: Module availability status
        error:
          type: string
          description: Error message if status is unavailable or error
          example: "Connection timeout after 5000ms"

    ModuleCapabilitiesResponse:
      type: object
      required:
        - module
        - capabilities
      properties:
        module:
          type: string
          description: Module name
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityDto'

    CapabilityDto:
      type: object
      required:
        - code
        - name
      properties:
        code:
          type: string
          description: Unique capability code (e.g., ef:auth:users:read)
        name:
          type: string
          description: Human-readable name
        description:
          type: string
          description: Detailed description

tags:
  - name: Capabilities
    description: Platform capabilities catalog (distributed ownership)
  - name: Password Management
    description: |
      Password management via Keycloak Admin API:
      - Initial password setup after email confirmation
