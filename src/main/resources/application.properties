# ============================================================================
# ECCLESIAFLOW AUTH MODULE - BASE CONFIGURATION
# ============================================================================
# This file contains common configuration for all environments.
# Environment-specific settings are in application-{profile}.properties
# Secrets are loaded from environment variables (never hardcoded)
# ============================================================================

# ============================================================================
# APPLICATION INFO
# ============================================================================
spring.application.name=ecclesiaflow-auth-module
server.port=8081

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

# JPA/Hibernate - Common settings (ddl-auto is profile-specific)
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}

# ============================================================================
# KEYCLOAK OAUTH2 CONFIGURATION
# ============================================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI}

# Keycloak Admin API
keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL}
keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM}
keycloak.admin.service.client-id=${KEYCLOAK_ADMIN_SERVICE_CLIENT_ID}
keycloak.admin.service.client-secret=${KEYCLOAK_ADMIN_SERVICE_CLIENT_SECRET}


# ============================================================================
# gRPC CONFIGURATION
# ============================================================================
grpc.enabled=true

# gRPC Clients
grpc.members.host=${GRPC_MEMBERS_HOST}
grpc.members.port=${GRPC_MEMBERS_PORT}
grpc.client.shutdown-timeout-seconds=${GRPC_CLIENT_SHUTDOWN_TIMEOUT}

# gRPC Server
grpc.server.port=${GRPC_SERVER_PORT}
grpc.server.shutdown-timeout-seconds=${GRPC_SERVER_SHUTDOWN_TIMEOUT}

# ============================================================================
# ACTUATOR CONFIGURATION (Kubernetes-ready)
# ============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ============================================================================
# CORS CONFIGURATION
# ============================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ============================================================================
# TOKEN CONFIGURATION
# ============================================================================
auth.token.setup.ttl-hours=${AUTH_TOKEN_SETUP_TTL_HOURS}

# ============================================================================
# SWAGGER / OPENAPI (springdoc)
# ============================================================================
# Disable in production via SPRINGDOC_SWAGGER_UI_ENABLED=false
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
