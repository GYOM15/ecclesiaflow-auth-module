# ============================================================================
# PRODUCTION PROFILE - Production Deployment
# ============================================================================
# This profile is for production deployment (Kubernetes, Cloud, etc.)
# Use .env.prod file to configure environment variables
# ALL SECRETS MUST BE PROVIDED VIA ENVIRONMENT VARIABLES
# ============================================================================

# ============================================================================
# DATABASE - Production (MySQL with schema validation only)
# ============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Connection pool optimization for production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# Hibernate performance optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================================
# LOGGING - Production (INFO level, structured logging)
# ============================================================================
logging.level.com.ecclesiaflow.springsecurity=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.root=INFO

# Log to stdout for Kubernetes (logs collected by container runtime)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ============================================================================
# ACTUATOR - Production (Kubernetes health probes)
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator
management.metrics.export.prometheus.enabled=true

# ============================================================================
# SECURITY - Production (Hardened error handling)
# ============================================================================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
