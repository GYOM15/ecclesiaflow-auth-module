services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: ecclesiaflow-keycloak
    environment:
      # Admin credentials
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      # Hostname & HTTP
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-8180}
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED:-true}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS:-xforwarded}

      # Observability
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true

      # Realm template secrets (consumed by init-realm.sh)
      KEYCLOAK_BACKEND_CLIENT_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET}
      KEYCLOAK_ADMIN_SERVICE_CLIENT_SECRET: ${KEYCLOAK_ADMIN_SERVICE_CLIENT_SECRET}

      # Frontend URIs (optional — defaults applied by init-realm.sh)
      FRONTEND_REDIRECT_URI_1: ${FRONTEND_REDIRECT_URI_1:-http://localhost:3000/*}
      FRONTEND_REDIRECT_URI_2: ${FRONTEND_REDIRECT_URI_2:-http://localhost:4200/*}
      FRONTEND_REDIRECT_URI_3: ${FRONTEND_REDIRECT_URI_3:-http://localhost:5173/*}
      FRONTEND_ORIGIN_1: ${FRONTEND_ORIGIN_1:-http://localhost:3000}
      FRONTEND_ORIGIN_2: ${FRONTEND_ORIGIN_2:-http://localhost:4200}
      FRONTEND_ORIGIN_3: ${FRONTEND_ORIGIN_3:-http://localhost:5173}
    entrypoint: ["sh", "/opt/keycloak/scripts/init-realm.sh"]
    command:
      - start-dev
      - --import-realm
    ports:
      - "${KEYCLOAK_HOST_PORT:-8180}:8080"
    volumes:
      - ./keycloak/realm-ecclesiaflow.json:/opt/keycloak/data/template/realm-ecclesiaflow.json:ro
      - ./keycloak/init-realm.sh:/opt/keycloak/scripts/init-realm.sh:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - ecclesiaflow-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;grep -q '200 OK' <&3"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s

  keycloak-db:
    image: postgres:16-alpine
    container_name: ecclesiaflow-keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - ecclesiaflow-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USERNAME:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  keycloak-db-data:
    driver: local

networks:
  ecclesiaflow-network:
    driver: bridge
